<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deyzgramm Ultimate</title>
    <!-- Подключаем правильные библиотеки Firebase v8 -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; user-select: none; }
        body { background-color: #0b141a; color: #e9edef; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #app-container { width: 100vw; height: 100vh; max-width: 480px; background-color: #111b21; display: flex; flex-direction: column; position: relative; box-shadow: 0 12px 24px rgba(0,0,0,0.5); }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; background-color: #111b21; z-index: 5; padding: 25px; justify-content: center; }
        .screen.hidden { display: none !important; }
        h2 { text-align: center; margin-bottom: 20px; font-weight: 400; color: #00a884; font-size: 28px; }
        .auth-form { display: flex; flex-direction: column; gap: 12px; }
        input, select { width: 100%; padding: 14px 16px; background-color: #2a3942; border: 1px solid #2a3942; border-radius: 8px; color: #fff; font-size: 16px; outline: none; }
        input::placeholder { color: #8696a0; }
        input:focus { border-color: #00a884; }
        button { width: 100%; padding: 14px; background-color: #00a884; color: #111b21; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:active { background-color: #008064; }
        .switch-auth { text-align: center; margin-top: 15px; color: #8696a0; font-size: 14px; cursor: pointer; }
        .switch-auth:hover { color: #00a884; }
        
        .tg-header { background-color: #202c33; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2f3b43; z-index: 10; }
        .tg-header-title { font-size: 19px; font-weight: 500; color: #e9edef; }
        .user-list { flex: 1; overflow-y: auto; background-color: #111b21; }
        .user-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #222d34; cursor: pointer; transition: background 0.2s; position: relative; }
        .user-item:active { background-color: #202c33; }
        .user-avatar { width: 48px; height: 48px; background-color: #687c87; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #fff; }
        .user-info { display: flex; flex-direction: column; gap: 4px; }
        .user-name { font-size: 16px; font-weight: 500; color: #e9edef; }
        .user-status { font-size: 14px; color: #8696a0; }
        
        #chat-screen { justify-content: flex-start; padding: 0; z-index: 6; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; background-image: url('https://githubusercontent.com'); background-color: #0b141a; display: flex; flex-direction: column; gap: 8px; }
        .msg-box { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 15px; line-height: 1.4; word-wrap: break-word; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .msg-box.my-msg { background-color: #005c4b; color: #e9edef; align-self: flex-end; border-top-right-radius: 0; }
        .msg-box.other-msg { background-color: #202c33; color: #e9edef; align-self: flex-start; border-top-left-radius: 0; }
        .chat-input-bar { background-color: #202c33; padding: 10px 12px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #2f3b43; }
        .chat-input-bar input { margin-bottom: 0; padding: 10px 12px; border-radius: 20px; background-color: #2a3942; border: none; font-size: 15px; }
        .send-btn { background: none; border: none; color: #00a884; font-size: 24px; cursor: pointer; padding: 0 8px; width: auto; }
        
        #settings-screen { justify-content: flex-start; padding: 0; z-index: 7; }
        .settings-content { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        #admin-screen { justify-content: flex-start; padding: 0; z-index: 8; }
        .admin-content { padding: 15px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-color: #0b141a; font-family: monospace; font-size: 12px; color: #00ff00; }
        
        .floating-err { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background-color: #ea0038; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- ЭКРАН РЕГИСТРАЦИИ -->
        <div id="reg-screen" class="screen">
            <h2>Deyzgramm Ultimate</h2>
            <div class="auth-form">
                <input type="text" id="reg-name" placeholder="Имя Создателя">
                <input type="text" id="reg-username" placeholder="Юзернейм (@deyzgramm)">
                <input type="email" id="reg-email" placeholder="Электронная почта">
                <input type="password" id="reg-pass1" placeholder="Пароль">
                <input type="password" id="reg-pass2" placeholder="Повтори пароль">
                <button onclick="handleRegister()">Зарегистрироваться</button>
                <div class="switch-auth" onclick="switchScreen('login-screen')">Уже есть аккаунт? Войти</div>
            </div>
        </div>

        <!-- ЭКРАН ВХОДА -->
        <div id="login-screen" class="screen hidden">
            <h2>Вход в Deyzgramm</h2>
            <div class="auth-form">
                <input type="email" id="login-email" placeholder="Электронная почта">
                <input type="password" id="login-pass" placeholder="Пароль">
                <button onclick="handleLogin()">Войти</button>
                <div class="switch-auth" onclick="switchScreen('reg-screen')">Создать аккаунт Создателя</div>
            </div>
        </div>

        <!-- ГЛАВНЫЙ ЭКРАН -->
        <div id="main-screen" class="screen hidden">
            <div class="tg-header">
                <span class="tg-header-title" id="header-title">Deyzgramm</span>
                <div style="display:flex; gap:12px; align-items:center;">
                    <span style="cursor:pointer; color:#00a884; font-size:20px;" onclick="switchScreen('admin-screen')" id="admin-eye" class="hidden">👁‍🗨</span>
                    <span style="cursor:pointer; color:#00a884; font-size:20px;" onclick="openSettings()">⚙</span>
                </div>
            </div>
            <div class="user-list" id="users-box"></div>
        </div>

        <!-- ЭКРАН ЧАТА -->
        <div id="chat-screen" class="screen hidden">
            <div class="tg-header">
                <span style="cursor:pointer; color:#00a884; font-size:22px;" onclick="closePersonalChat()">⬅</span>
                <span class="tg-header-title" id="chat-header-name">Чат</span>
                <span style="width:22px;"></span>
            </div>
            <div class="chat-messages" id="chat-msg-container"></div>
            <div class="chat-input-bar">
                <span style="font-size:22px; cursor:pointer;">😀</span>
                <span style="font-size:22px; cursor:pointer;">📎</span>
                <input type="text" id="msg-input-field" placeholder="Сообщение" onkeypress="handleBgKey(event)">
                <button class="send-btn" onclick="sendPersonalMessage()">➔</button>
            </div>
        </div>

        <!-- ЭКРАН НАСТРОЕК -->
        <div id="settings-screen" class="screen hidden">
            <div class="tg-header">
                <span style="cursor:pointer; color:#00a884; font-size:22px;" onclick="switchScreen('main-screen')">⬅</span>
                <span class="tg-header-title">Настройки Профиля</span>
                <button onclick="logout()" style="width:auto; padding:6px 12px; background-color:#ea0038; font-size:12px; color:#fff;">Выйти</button>
            </div>
            <div class="settings-content">
                <input type="text" id="set-name" placeholder="Имя">
                <input type="text" id="set-username" placeholder="Юзернейм">
                <label style="font-size:14px; color:#8696a0;">Цвет твоих сообщений:</label>
                <select id="set-color">
                    <option value="#005c4b">Стандартный зелёный</option>
                    <option value="#3498db">Синий неон</option>
                    <option value="#9b59b6">Аметист</option>
                    <option value="#e67e22">Оранжевый закат</option>
                </select>
                <button onclick="saveSettingsChanges()">Сохранить изменения</button>
            </div>
        </div>

        <!-- ЭКРАН АДМИН-ЛОГОВ -->
        <div id="admin-screen" class="screen hidden">
            <div class="tg-header">
                <span style="cursor:pointer; color:#00a884; font-size:22px;" onclick="switchScreen('main-screen')">⬅</span>
                <span class="tg-header-title">GLOBAL LOGS v1.0 ONLINE</span>
                <span style="width:22px;"></span>
            </div>
            <div class="admin-content" id="admin-logs-box"></div>
        </div>
    </div>
        <script>
        // Твоя идеальная конфигурация со всеми ID
        let config = {
            apiKey: "AIzaSyDKEaKNdXQ4lX5PTjf-VHsuFNroC5Xa4u4",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "deyzgramm",
            storageBucket: "deyzgramm.firebasestorage.app",
            messagingSenderId: "441290598892",
            appId: "1:441290598892:web:1933d9e63f48270a78b8c9"
        };
        
        firebase.initializeApp(config);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentUserInfo = { uid: null, name: '', username: '', msgColor: '#005c4b' };
        let activeChatUserId = null, allUsersArray = [];
        const msgInputField = document.getElementById('msg-input-field');

        // Отслеживание входа в сеть
        auth.onAuthStateChanged((u) => {
            if (u) {
                currentUserInfo.uid = u.uid; currentUserInfo.name = u.displayName || 'Создатель';
                if(u.email === 'aemirov299@gmail.com') document.getElementById('admin-eye').classList.remove('hidden');
                database.ref('users/' + u.uid).on('value', (snap) => {
                    const data = snap.val() || {};
                    currentUserInfo.msgColor = data.msgColor || '#005c4b';
                    currentUserInfo.username = data.username || '@deyzgramm';
                    document.getElementById('set-name').value = currentUserInfo.name;
                    document.getElementById('set-username').value = currentUserInfo.username;
                    document.getElementById('set-color').value = currentUserInfo.msgColor;
                });
                switchScreen('main-screen'); loadUsersList(); listenGlobalLogs();
            } else {
                switchScreen('reg-screen');
            }
        });
                    function handleRegister() {
            const name = document.getElementById('reg-name').value.trim();
            let uName = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const p1 = document.getElementById('reg-pass1').value.trim();
            const p2 = document.getElementById('reg-pass2').value.trim();
            if(!name || !uName || !email || !p1 || !p2) { showFloatingError('Заполни все поля!'); return; }
            if(p1 !== p2) { showFloatingError('Пароли не совпадают!'); return; }
            if(!uName.startsWith('@')) uName = '@' + uName;
            
            auth.createUserWithEmailAndPassword(email, p1).then((res) => {
                res.user.updateProfile({ displayName: name });
                database.ref('users/' + res.user.uid).set({ name: name, username: uName, email: email, msgColor: '#005c4b' });
                logAdminEvent('Регистрация: ' + uName);
            }).catch((e) => { showFloatingError(e.message); });
        }

        function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            if(!email || !p) { showFloatingError('Заполни поля!'); return; }
            auth.signInWithEmailAndPassword(email, p).then((res) => {
                logAdminEvent('Вход в сеть: ' + email);
            }).catch((e) => { showFloatingError(e.message); });
            }
                    function loadUsersList() {
            database.ref('users').on('value', (snap) => {
                const uBox = document.getElementById('users-box'); uBox.innerHTML = ''; allUsersArray = [];
                snap.forEach((child) => {
                    const uid = child.key; const data = child.val();
                    if(uid === currentUserInfo.uid) return;
                    allUsersArray.push({ uid: uid, ...data });
                    const item = document.createElement('div'); item.className = 'user-item';
                    item.onclick = () => openPersonalChat(uid, data.name);
                    item.innerHTML = `<div class="user-avatar">${data.name.toUpperCase()}</div><div class="user-info"><span class="user-name">${data.name}</span><span class="user-status">${data.username}</span></div>`;
                    uBox.appendChild(item);
                });
            });
        }

        function openPersonalChat(targetUid, targetName) {
            activeChatUserId = targetUid;
            document.getElementById('chat-header-name').textContent = targetName;
            switchScreen('chat-screen');
            const chatId = getChatId();
            database.ref('messages/' + chatId).on('value', (snap) => {
                const container = document.getElementById('chat-msg-container'); container.innerHTML = '';
                snap.forEach((child) => {
                    const msg = child.val(); const box = document.createElement('div');
                    box.className = 'msg-box ' + (msg.sender === currentUserInfo.uid ? 'my-msg' : 'other-msg');
                    if(msg.sender === currentUserInfo.uid) box.style.backgroundColor = currentUserInfo.msgColor;
                    box.textContent = msg.text; container.appendChild(box);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        function closePersonalChat() {
            if(activeChatUserId) database.ref('messages/' + getChatId()).off();
            activeChatUserId = null; switchScreen('main-screen');
        }

        function sendPersonalMessage() {
            const text = msgInputField.value.trim(); if(!text || !activeChatUserId) return;
            const chatId = getChatId();
            database.ref('messages/' + chatId).push({ sender: currentUserInfo.uid, text: text, timestamp: Date.now() });
            logAdminEvent(currentUserInfo.username + ' отправил ЛС');
            msgInputField.value = '';
        }

        function getChatId() { return currentUserInfo.uid < activeChatUserId ? currentUserInfo.uid + '_' + activeChatUserId : activeChatUserId + '_' + currentUserInfo.uid; }
        function handleBgKey(e) { if(e.key === 'Enter') sendPersonalMessage(); }
        function openSettings() { switchScreen('settings-screen'); }
        
        function saveSettingsChanges() {
            const n = document.getElementById('set-name').value.trim();
            let un = document.getElementById('set-username').value.trim();
            const col = document.getElementById('set-color').value;
            if(!n || !un) return; if(!un.startsWith('@')) un = '@' + un;
            auth.currentUser.updateProfile({ displayName: n });
            database.ref('users/' + currentUserInfo.uid).update({ name: n, username: un, msgColor: col });
            switchScreen('main-screen');
        }

        function logAdminEvent(txt) { database.ref('admin_logs').push({ text: txt, time: new Date().toLocaleTimeString() }); }
        function listenGlobalLogs() {
            database.ref('admin_logs').limitToLast(40).on('value', (snap) => {
                const box = document.getElementById('admin-logs-box'); box.innerHTML = '';
                snap.forEach((child) => {
                    const l = child.val(); const item = document.createElement('div');
                    item.textContent = `[${l.time}] ${l.text}`; box.appendChild(item);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function logout() { auth.signOut().then(() => location.reload()); }
        function showFloatingError(m) {
            const e = document.createElement('div'); e.className = 'floating-err'; e.textContent = m;
            document.getElementById('app-container').appendChild(e); setTimeout(() => e.remove(), 3000);
        }
        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
